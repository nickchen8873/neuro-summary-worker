name: Neuro RSS Agent Schedule

on:
  schedule:
    # 每天 08:00 (UTC+8) = 00:00 UTC
    - cron: '0 0 * * *'
  # 允許在 GitHub UI 手動觸發，方便測試
  workflow_dispatch:

# 允許 GITHUB_TOKEN 把 archive commit & push 回 repo
permissions:
  contents: write

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Neuro RSS Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node index.js

      # 即使 Agent 執行失敗（例如 Telegram 推播失敗），只要有產生 archive 也要 commit 起來
      - name: Commit archive
        if: always()
        run: |
          if [ ! -d archive ]; then
            echo "No archive directory; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add archive/
          if git diff --cached --quiet; then
            echo "No archive changes to commit."
          else
            git commit -m "chore(archive): add summary $(TZ=Asia/Taipei date +%Y-%m-%d)"
            git push
          fi
